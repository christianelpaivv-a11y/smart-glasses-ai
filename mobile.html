<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <title>Smart Glasses</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; width: 100vw; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: env(safe-area-inset-top, 16px) 0 env(safe-area-inset-bottom, 16px); overflow-x: hidden; }
    .container { width: 100%; max-width: 420px; padding: 20px 16px; color: white; text-align: center; }
    .status { font-size: 14px; color: #aaa; margin-bottom: 12px; min-height: 20px; transition: color 0.2s; }
    .status.error { color: #ff6b6b; } .status.ok { color: #6bffb8; }
    .toggles { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 16px; }
    .toggle { padding: 9px 18px; background: #1a1f2f; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; color: #7c85a5; user-select: none; -webkit-user-select: none; touch-action: manipulation; transition: background 0.15s, color 0.15s; }
    .toggle.active { background: #3b4b8c; color: #fff; }
    #cameraBtn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding: 0 4px; display: none; }
    #cameraBtn:active { color: #8b9cf7; }
    .hold-btn { width: 100%; height: 130px; background: #1a1f2f; border: 3px solid #3b4b8c; border-radius: 24px; color: white; font-size: 22px; font-weight: bold; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; user-select: none; -webkit-user-select: none; touch-action: manipulation; margin-bottom: 16px; transition: background 0.12s, border-color 0.12s, transform 0.08s; cursor: pointer; }
    .hold-btn:active, .hold-btn.active { background: #3b4b8c; border-color: #8b9cf7; transform: scale(0.98); }
    .hold-btn .btn-sub { font-size: 13px; font-weight: 400; color: #8b9cf7; }
    .text-input-area { display: none; margin-bottom: 16px; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
    .text-input-row { display: flex; gap: 8px; align-items: center; }
    .text-input { flex: 1; background: #1a1f2f; border: 2px solid #3b4b8c; border-radius: 12px; color: #fff; font-size: 16px; padding: 12px 14px; outline: none; transition: border-color 0.15s; }
    .text-input:focus { border-color: #8b9cf7; } .text-input::placeholder { color: #555; }
    .send-btn { background: #3b4b8c; border: none; border-radius: 12px; color: #fff; font-size: 22px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; touch-action: manipulation; flex-shrink: 0; transition: background 0.12s; }
    .send-btn:active { background: #5a6dc2; }
    .answer-box { background: #111; border-radius: 16px; padding: 18px 16px; min-height: 90px; margin-bottom: 12px; }
    .step-counter { font-size: 13px; color: #8b9cf7; margin-bottom: 8px; }
    .step-text { font-size: 17px; line-height: 1.5; color: #eee; }
    .debug-log { background: #111; border-radius: 12px; padding: 8px 10px; max-height: 90px; overflow-y: auto; text-align: left; font-family: monospace; font-size: 11px; color: #888; margin-top: 4px; }
    .debug-log p { margin: 1px 0; }
    .hint { font-size: 11px; color: #444; margin-top: 10px; padding: 0 8px; line-height: 1.4; }
    .camera-container { display: none; margin-bottom: 16px; position: relative; background: #000; border-radius: 16px; overflow: hidden; }
    .camera-container video { width: 100%; border-radius: 16px; }
    .capture-btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: #3b4b8c; color: white; border: none; padding: 14px 28px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; }
    .close-camera-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 16px; cursor: pointer; }
    .doc-preview { display: none; background: #111; border-radius: 12px; padding: 10px; margin-bottom: 12px; max-height: 120px; overflow-y: auto; font-size: 14px; color: #ccc; text-align: left; }
    .doc-preview .doc-header { display: flex; justify-content: space-between; align-items: center; }
    .doc-preview .doc-header span { color: #8b9cf7; font-weight: bold; }
    .doc-preview .doc-header button { background: none; border: none; color: #aaa; cursor: pointer; font-size: 14px; }
    .doc-preview .doc-body { margin-top: 6px; white-space: pre-wrap; }
    .drop-zone { display: none; border: 2px dashed #3b4b8c; border-radius: 16px; padding: 24px 16px; margin-bottom: 16px; cursor: pointer; transition: background 0.15s; color: #7c85a5; }
    .drop-zone.dragover { background: #1a1f2f; border-color: #8b9cf7; }
    .drop-zone-content p { margin-top: 8px; font-size: 14px; }
  </style>
</head>
<body>
<div class="container">
  <div class="status" id="status">⏳ Connecting…</div>
  <div class="toggles">
    <div class="toggle active" id="motionToggle">🏃 Motion</div>
    <div class="toggle active" id="docToggle">📄 Doc</div>
    <button id="cameraBtn" aria-label="Open camera"><i class="fas fa-camera"></i></button>
  </div>
  <div class="camera-container" id="cameraContainer">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <button class="capture-btn" id="captureBtn"><i class="fas fa-camera"></i> Capture</button>
    <button class="close-camera-btn" id="closeCameraBtn"><i class="fas fa-times"></i></button>
  </div>
  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-content">
      <i class="fas fa-cloud-upload-alt" style="font-size: 32px; color: #8b9cf7;"></i>
      <p>Drop an image here<br>or click to select</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none;">
  </div>
  <div class="doc-preview" id="docPreview">
    <div class="doc-header">
      <span>📄 Scanned Document</span>
      <button onclick="clearDocument()"><i class="fas fa-times"></i> Clear</button>
    </div>
    <div class="doc-body" id="docText"></div>
  </div>
  <div class="hold-btn" id="holdBtn">
    <span id="btnIcon">🎤</span>
    <span id="btnLabel">Hold to Speak</span>
    <span class="btn-sub" id="btnSub">detecting mic…</span>
  </div>
  <div class="text-input-area" id="textInputArea">
    <div class="text-input-row">
      <input class="text-input" id="textInput" type="text" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Type your question…" enterkeyhint="send">
      <button class="send-btn" id="sendBtn" aria-label="Send">➤</button>
    </div>
  </div>
  <div class="answer-box">
    <div class="step-counter" id="stepLabel">—</div>
    <div class="step-text" id="stepText">Your answer will appear here.</div>
  </div>
  <div class="debug-log" id="debugLog"></div>
  <div class="hint" id="hint">Use headphones or speaker for voice responses.</div>
</div>
<script>
 
<script>
 
/* ═══════════════════════════════════════════════════════════════
   Smart Glasses – mobile.html  (fixed)
 
   ROOT CAUSES FIXED
   ─────────────────
   BUG 1 – Syntax error: duplicate desktop block was sitting OUTSIDE
     the closing } of playNextStreaming(), making `step`, `audio`,
     `mediaSource` undefined at script root. iOS Safari / Firefox
     mobile abort the entire <script> on this — nothing worked on
     mobile even though lenient desktop parsers let it slide.
     FIX: function written once, cleanly, no duplicate code.
 
   BUG 2 – speechSynthesis silently blocked on iOS Safari.
     speak() from ws.onmessage is async / not a user gesture.
     iOS enforces this strictly and drops the call with no error.
     FIX: primeSpeechSynthesis() fires a zero-volume utterance
     during every button press (synchronous user gesture), which
     unlocks the engine for the rest of the session.
 
   BUG 3 – iOS pauses speechSynthesis after ~15 s of inactivity.
     FIX: 10-second keepalive calls speechSynthesis.resume().
 
   BUG 4 – AudioContext re-suspended after gesture ends on mobile.
     FIX: resume() called immediately before every decodeAudioData.
   ═══════════════════════════════════════════════════════════════ */
 
const WS_URL           = 'wss://smart-glasses-i1t6.onrender.com/ws';
const RECONNECT_BASE   = 1500;
const RECONNECT_MAX    = 30000;
const RECONNECT_FACTOR = 2;
 
const IS_MOBILE = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
 
/* ── DOM refs ─────────────────────────────────────────────── */
const statusEl    = document.getElementById('status');
const holdBtn     = document.getElementById('holdBtn');
const btnIcon     = document.getElementById('btnIcon');
const btnLabel    = document.getElementById('btnLabel');
const btnSub      = document.getElementById('btnSub');
const textArea    = document.getElementById('textInputArea');
const textInput   = document.getElementById('textInput');
const sendBtn     = document.getElementById('sendBtn');
const stepLabel   = document.getElementById('stepLabel');
const stepText    = document.getElementById('stepText');
const debugEl     = document.getElementById('debugLog');
const hintEl      = document.getElementById('hint');
const motionTogEl = document.getElementById('motionToggle');
const docTogEl    = document.getElementById('docToggle');
const cameraBtnEl = document.getElementById('cameraBtn');
 
/* ── State ────────────────────────────────────────────────── */
let ws             = null, sessionId = null;
let reconnectDelay = RECONNECT_BASE, reconnectTimer = null;
let motionDetected = true, documentInView = true;
let inputMode = 'pending', recognition = null, recState = 'idle';
let lastInterim = '', finalSent = false;
let audioCtx = null, synthPrimed = false, synthKeepalive = null;
let audioQueue = [], isPlaying = false, currentlyPlaying = null;
let mediaSource = null, sourceBuffer = null, pendingChunks = [];
let documentText = '', cameraStream = null;
 
/* ── Logging ──────────────────────────────────────────────── */
function log(msg) {
  const p = document.createElement('p');
  p.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  debugEl.appendChild(p);
  debugEl.scrollTop = debugEl.scrollHeight;
  console.log(msg);
}
function setStatus(msg, cls) {
  statusEl.textContent = msg;
  statusEl.className = 'status ' + (cls || '');
}
 
/* ── Toggles ──────────────────────────────────────────────── */
function initToggles() {
  motionTogEl.addEventListener('click', () => {
    motionDetected = !motionDetected;
    motionTogEl.textContent = motionDetected ? '🏃 Motion' : '🚶 Motion OFF';
    motionTogEl.classList.toggle('active', motionDetected);
  });
  docTogEl.addEventListener('click', () => {
    documentInView = !documentInView;
    docTogEl.textContent = documentInView ? '📄 Doc' : '📄 Doc OFF';
    docTogEl.classList.toggle('active', documentInView);
    cameraBtnEl.style.display = documentInView ? 'inline-block' : 'none';
    document.getElementById('dropZone').style.display = documentInView ? 'block' : 'none';
    if (!documentInView) { stopCamera(); clearDocument(); }
  });
  cameraBtnEl.addEventListener('click', openCamera);
}
 
/* ── WebSocket ────────────────────────────────────────────── */
function connectWebSocket() {
  if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;
  log('Connecting to ' + WS_URL);
  setStatus('⏳ Connecting…');
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    reconnectDelay = RECONNECT_BASE;
    clearTimeout(reconnectTimer); reconnectTimer = null;
    setStatus('🟢 Ready', 'ok');
    log('WebSocket connected');
  };
  ws.onclose = ev => { log('WS closed (' + ev.code + ')'); setStatus('🔴 Reconnecting…', 'error'); scheduleReconnect(); };
  ws.onerror = () => log('WS error');
  ws.onmessage = ev => {
    let data; try { data = JSON.parse(ev.data); } catch { log('Bad JSON'); return; }
    if (data.session_id) { sessionId = data.session_id; log('Session: ' + sessionId); return; }
    if (data.info) { setStatus('ℹ️ ' + data.info); log('Info: ' + data.info); return; }
    if (data.step_start) {
      const entry = { meta: data.step_start, chunks: [], completed: false, played: false };
      audioQueue.push(entry);
      log('step_start ' + data.step_start.step + '/' + data.step_start.total_steps + ': ' + data.step_start.text.slice(0,40));
      stepText.textContent  = data.step_start.text;
      stepLabel.textContent = 'Step ' + data.step_start.step + ' of ' + data.step_start.total_steps;
      setStatus('🔊 Buffering…');
      if (!isPlaying) playNext();
      return;
    }
    if (data.audio_chunk) {
      for (let i = audioQueue.length - 1; i >= 0; i--) {
        if (!audioQueue[i].completed) {
          audioQueue[i].chunks.push(data.audio_chunk);
          if (audioQueue[i] === currentlyPlaying && !IS_MOBILE) feedChunksToSourceBuffer(audioQueue[i]);
          break;
        }
      }
      return;
    }
    if (data.step_end) {
      for (let i = audioQueue.length - 1; i >= 0; i--) {
        if (!audioQueue[i].completed) {
          audioQueue[i].completed = true;
          log('step_end chunks=' + audioQueue[i].chunks.length + (IS_MOBILE ? ' mobile' : ' desktop'));
          if (IS_MOBILE && audioQueue[i] === currentlyPlaying) tryMobileAudio(audioQueue[i]);
          else if (!IS_MOBILE && audioQueue[i] === currentlyPlaying && mediaSource && mediaSource.readyState === 'open') mediaSource.endOfStream();
          break;
        }
      }
    }
  };
}
 
function scheduleReconnect() {
  if (reconnectTimer) return;
  log('Reconnect in ' + Math.round(reconnectDelay/1000) + 's');
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    reconnectDelay = Math.min(reconnectDelay * RECONNECT_FACTOR, RECONNECT_MAX);
    connectWebSocket();
  }, reconnectDelay);
}
 
/* ── Send question ────────────────────────────────────────── */
function sendQuestion(question) {
  question = question.trim();
  if (!question) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) { setStatus('⛔ Not connected', 'error'); return; }
  audioQueue = []; isPlaying = false; currentlyPlaying = null;
  stepText.textContent = 'Thinking…'; stepLabel.textContent = '—';
  setStatus('🧠 Thinking…');
  log('Sending: ' + question);
  ws.send(JSON.stringify({ text: question, motion: motionDetected, document: documentInView, session_id: sessionId ?? undefined, document_text: (documentInView && documentText) ? documentText : undefined }));
}
 
/* ═══════════════════════════════════════════════════════════
   AUDIO UNLOCK
   ═══════════════════════════════════════════════════════════ */
function ensureAudioContext() {
  if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); log('AudioContext state=' + audioCtx.state); }
  if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
}
 
/* primeSpeechSynthesis MUST be called from a synchronous user-gesture
   handler (e.g. pointerdown). The empty utterance unlocks iOS Safari's
   speech engine so later async speak() calls actually play. */
function primeSpeechSynthesis() {
  if (synthPrimed || !('speechSynthesis' in window)) return;
  synthPrimed = true;
  const u = new SpeechSynthesisUtterance('');
  u.volume = 0; u.rate = 16;
  window.speechSynthesis.speak(u);
  log('speechSynthesis primed');
  synthKeepalive = setInterval(() => { if (window.speechSynthesis.paused) window.speechSynthesis.resume(); }, 10000);
}
 
/* ═══════════════════════════════════════════════════════════
   PLAYBACK
   ═══════════════════════════════════════════════════════════ */
function playNext() {
  const step = audioQueue.find(s => !s.played);
  if (!step) { isPlaying = false; currentlyPlaying = null; setStatus('✅ Done', 'ok'); if (synthKeepalive) { clearInterval(synthKeepalive); synthKeepalive = null; } return; }
  isPlaying = true; currentlyPlaying = step; step.played = true;
  setStatus('🔊 Speaking…');
  stepText.textContent  = step.meta.text;
  stepLabel.textContent = 'Step ' + step.meta.step + ' of ' + step.meta.total_steps;
 
  if (IS_MOBILE) {
    if (step.completed) tryMobileAudio(step);
    // else: tryMobileAudio called from step_end handler
    return;
  }
 
  /* ── Desktop: MediaSource streaming ── */
  pendingChunks = [];
  mediaSource = new MediaSource();
  const audio = new Audio();
  audio.src = URL.createObjectURL(mediaSource);
  window._currentAudio = audio;
 
  mediaSource.addEventListener('sourceopen', () => {
    try {
      sourceBuffer = mediaSource.addSourceBuffer('audio/mpeg');
      sourceBuffer.mode = 'sequence';
      feedChunksToSourceBuffer(step);
      if (step.completed && mediaSource.readyState === 'open') mediaSource.endOfStream();
    } catch(e) { log('MediaSource err: ' + e.message); desktopFallback(step); }
  });
 
  audio.onended = () => { try { URL.revokeObjectURL(audio.src); } catch(_){} mediaSource = null; sourceBuffer = null; currentlyPlaying = null; playNext(); };
  audio.onerror = () => audio.onended();
  audio.play().catch(e => log('play() err: ' + e.message));
}
 
/* ── Mobile: AudioContext then TTS ────────────────────────── */
async function tryMobileAudio(step) {
  const fullBase64 = step.chunks.join('');
  if (fullBase64) {
    try {
      ensureAudioContext();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      const bin = atob(fullBase64), bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      const buf = await audioCtx.decodeAudioData(bytes.buffer.slice(0));
      await new Promise((res, rej) => { const src = audioCtx.createBufferSource(); src.buffer = buf; src.connect(audioCtx.destination); src.onended = res; src.onerror = rej; src.start(0); });
      log('AudioContext OK');
      currentlyPlaying = null; playNext(); return;
    } catch(e) { log('AudioContext failed: ' + e.message + ' → TTS'); }
  } else {
    log('No audio chunks → TTS');
  }
  speakViaTTS(step.meta.text, () => { currentlyPlaying = null; playNext(); });
}
 
function speakViaTTS(text, onDone) {
  if (!('speechSynthesis' in window)) { log('No speechSynthesis'); onDone(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 1.0; u.pitch = 1.0; u.volume = 1.0;
  const approxMs = Math.max(5000, text.split(' ').length * 400 + 2000);
  const safety = setTimeout(() => { log('TTS safety timeout'); window.speechSynthesis.cancel(); onDone(); }, approxMs);
  u.onend = () => { clearTimeout(safety); log('TTS done'); onDone(); };
  u.onerror = e => { clearTimeout(safety); log('TTS err: ' + e.error); onDone(); };
  window.speechSynthesis.speak(u);
  log('TTS speak() synthPrimed=' + synthPrimed);
}
 
function desktopFallback(step) {
  const b64 = step.chunks.join('');
  if (!b64) { currentlyPlaying = null; playNext(); return; }
  const bin = atob(b64), bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const url = URL.createObjectURL(new Blob([bytes], { type: 'audio/mpeg' }));
  const audio = new Audio(url);
  audio.onended = () => { URL.revokeObjectURL(url); currentlyPlaying = null; playNext(); };
  audio.onerror = audio.onended;
  audio.play().catch(e => { log('fallback blocked: ' + e.message); audio.onended(); });
}
 
function feedChunksToSourceBuffer(step) {
  if (!sourceBuffer || sourceBuffer.updating) {
    pendingChunks.push(...step.chunks.splice(0));
    if (sourceBuffer) sourceBuffer.addEventListener('updateend', () => { if (pendingChunks.length > 0) { const c = pendingChunks.shift(); try { sourceBuffer.appendBuffer(b64ToBuffer(c)); } catch(_){} } }, { once: true });
    return;
  }
  while (step.chunks.length > 0) {
    const chunk = step.chunks.shift();
    if (!sourceBuffer.updating) { try { sourceBuffer.appendBuffer(b64ToBuffer(chunk)); } catch(e) { desktopFallback(step); return; } }
    else { step.chunks.unshift(chunk); sourceBuffer.addEventListener('updateend', () => feedChunksToSourceBuffer(step), { once: true }); break; }
  }
  if (step.completed && step.chunks.length === 0 && mediaSource && mediaSource.readyState === 'open') mediaSource.endOfStream();
}
 
function b64ToBuffer(b64) {
  const bin = atob(b64), bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}
 
/* ═══════════════════════════════════════════════════════════
   SPEECH RECOGNITION
   ═══════════════════════════════════════════════════════════ */
function hasSpeechAPI() { return !!(window.SpeechRecognition || window.webkitSpeechRecognition); }
 
function switchToTextMode(reason) {
  if (inputMode === 'text') return;
  inputMode = 'text'; log('Text mode: ' + reason);
  btnIcon.textContent = '⌨️'; btnLabel.textContent = 'Tap to Type'; btnSub.textContent = '';
  textArea.style.display = 'block';
  hintEl.textContent = '⌨️ Mic unavailable. Type your question below.';
  if (recognition) { try { recognition.abort(); } catch(_){} recognition = null; }
}
 
function switchToMicMode() {
  inputMode = 'mic';
  btnIcon.textContent = '🎤'; btnLabel.textContent = 'Hold to Speak'; btnSub.textContent = 'release to send';
  textArea.style.display = 'none';
  hintEl.textContent = 'Use headphones or speaker for voice responses.';
  log('Mic mode active');
}
 
function buildRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = 'en-US'; rec.interimResults = true; rec.continuous = false; rec.maxAlternatives = 1;
  rec.onstart = () => { recState = 'running'; lastInterim = ''; finalSent = false; setStatus('🎤 Listening…'); log('Rec running WS=' + (ws ? ['CONNECTING','OPEN','CLOSING','CLOSED'][ws.readyState] : 'null')); };
  rec.onresult = ev => {
    let interim = '';
    for (let i = ev.resultIndex; i < ev.results.length; i++) {
      const t = ev.results[i][0].transcript;
      if (ev.results[i].isFinal) { log('Final: ' + t); setStatus('✅ Got: ' + t.slice(0,40)); finalSent = true; sendQuestion(t); safeStopRecognition(); return; }
      interim += t;
    }
    if (interim) { lastInterim = interim; setStatus('👂 ' + interim.slice(0,50)); }
  };
  rec.onerror = ev => {
    log('Rec err: ' + ev.error); recState = 'idle'; holdBtn.classList.remove('active'); btnLabel.textContent = 'Hold to Speak';
    if (ev.error === 'aborted') return;
    if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') { setStatus('🔇 Mic blocked', 'error'); switchToTextMode(ev.error); return; }
    if (ev.error === 'network') { setStatus('⚠️ Network error', 'error'); switchToTextMode('network'); return; }
    setStatus('⚠️ Mic: ' + ev.error, 'error');
  };
  rec.onend = () => {
    log('Rec ended finalSent=' + finalSent + ' interim="' + lastInterim + '"');
    recState = 'idle'; holdBtn.classList.remove('active');
    if (inputMode === 'mic') { btnLabel.textContent = 'Hold to Speak'; btnSub.textContent = 'release to send'; }
    if (!finalSent && lastInterim.trim()) { log('Firefox fallback: "' + lastInterim.trim() + '"'); setStatus('✅ Got: ' + lastInterim.slice(0,40)); sendQuestion(lastInterim.trim()); }
    else if (!finalSent) { setStatus('🎤 Nothing heard. Try again.'); }
    lastInterim = ''; finalSent = false;
  };
  return rec;
}
 
function safeStartRecognition() {
  if (recState !== 'idle') return;
  recState = 'starting';
  if (!recognition) recognition = buildRecognition();
  try { recognition.start(); holdBtn.classList.add('active'); btnLabel.textContent = 'Listening…'; btnSub.textContent = 'release to send'; log('rec.start()'); }
  catch(e) { recState = 'idle'; recognition = null; log('rec.start() threw: ' + e.message); }
}
 
function safeStopRecognition() {
  if (recState === 'idle' || recState === 'stopping') return;
  recState = 'stopping';
  if (recognition) { try { recognition.stop(); } catch(e) { log('rec.stop() threw: ' + e.message); } }
}
 
/* ── Button handlers ──────────────────────────────────────── */
function onButtonDown(ev) {
  ev.preventDefault();
  ensureAudioContext();
  primeSpeechSynthesis();   // MUST be here (synchronous user gesture) for iOS
  if (inputMode === 'pending') {
    if (!hasSpeechAPI()) { switchToTextMode('no SpeechRecognition'); setTimeout(() => textInput.focus(), 100); return; }
    switchToMicMode(); safeStartRecognition(); return;
  }
  if (inputMode === 'mic') { safeStartRecognition(); return; }
  if (inputMode === 'text') { textArea.style.display = 'block'; setTimeout(() => textInput.focus(), 50); }
}
function onButtonUp(ev) { ev.preventDefault(); if (inputMode === 'mic') safeStopRecognition(); }
 
holdBtn.addEventListener('pointerdown',  onButtonDown, { passive: false });
holdBtn.addEventListener('pointerup',    onButtonUp,   { passive: false });
holdBtn.addEventListener('pointerleave', onButtonUp,   { passive: false });
holdBtn.addEventListener('contextmenu',  e => e.preventDefault());
 
function submitText() {
  const q = textInput.value.trim(); if (!q) return;
  textInput.value = ''; ensureAudioContext(); primeSpeechSynthesis(); sendQuestion(q);
}
sendBtn.addEventListener('click', e => { e.preventDefault(); submitText(); });
textInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); submitText(); } });
 
/* ═══════════════════════════════════════════════════════════
   CAMERA & OCR
   ═══════════════════════════════════════════════════════════ */
function openCamera() {
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(s => { cameraStream = s; document.getElementById('video').srcObject = s; document.getElementById('cameraContainer').style.display = 'block'; log('Camera opened'); })
    .catch(err => { log('Camera err: ' + err.message); setStatus('⚠️ Camera unavailable', 'error'); });
}
function stopCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  document.getElementById('cameraContainer').style.display = 'none';
  document.getElementById('video').srcObject = null;
}
function clearDocument() {
  documentText = '';
  document.getElementById('docText').innerText = '';
  document.getElementById('docPreview').style.display = 'none';
  log('Document cleared');
}
function loadTesseract() {
  return new Promise((res, rej) => {
    if (window.Tesseract) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js';
    s.onload = res; s.onerror = () => rej(new Error('Tesseract load failed'));
    document.head.appendChild(s);
  });
}
function runOCR(imageDataUrl) {
  log('Running OCR…'); setStatus('🔍 Scanning…');
  loadTesseract().then(() => {
    Tesseract.recognize(imageDataUrl, 'eng', { logger: m => { if (m.status === 'recognizing text') setStatus('🔍 OCR ' + Math.round(m.progress*100) + '%'); } })
      .then(({ data: { text } }) => {
        if (text.trim()) { documentText = text.trim(); document.getElementById('docText').innerText = documentText; document.getElementById('docPreview').style.display = 'block'; log('OCR: ' + documentText.slice(0,80)); setStatus('📄 Scanned – answering…'); ensureAudioContext(); primeSpeechSynthesis(); sendQuestion(documentText); }
        else { setStatus('⚠️ No text detected'); }
        stopCamera();
      }).catch(err => { log('OCR err: ' + err.message); setStatus('⚠️ OCR failed'); stopCamera(); });
  }).catch(err => { log(err.message); setStatus('⚠️ OCR engine failed'); });
}
 
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('captureBtn').addEventListener('click', () => {
    const v = document.getElementById('video'), c = document.getElementById('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    c.getContext('2d').drawImage(v, 0, 0);
    runOCR(c.toDataURL('image/png'));
  });
  document.getElementById('closeCameraBtn').addEventListener('click', stopCamera);
  const dz = document.getElementById('dropZone'), fi = document.getElementById('fileInput');
  ['dragenter','dragover','dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); }));
  dz.addEventListener('dragover', () => dz.classList.add('dragover'));
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => { dz.classList.remove('dragover'); const f = e.dataTransfer.files[0]; if (f && f.type.startsWith('image/')) { const r = new FileReader(); r.onload = ev => runOCR(ev.target.result); r.readAsDataURL(f); } });
  dz.addEventListener('click', () => fi.click());
  fi.addEventListener('change', e => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = ev => runOCR(ev.target.result); r.readAsDataURL(f); } });
});
 
/* ── Boot ─────────────────────────────────────────────────── */
(function init() {
  log('Loaded · ' + navigator.userAgent.slice(0, 80));
  log('IS_MOBILE=' + IS_MOBILE);
  initToggles();
  btnIcon.textContent = '🎤'; btnLabel.textContent = 'Hold to Speak'; btnSub.textContent = 'mic availability will be checked';
  connectWebSocket();
  if (!hasSpeechAPI()) { switchToTextMode('no SpeechRecognition API'); setStatus('⌨️ Text mode', 'error'); }
})();
 
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
}
 
</script>
